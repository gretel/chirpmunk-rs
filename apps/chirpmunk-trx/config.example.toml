#
# Example chirpmunk-trx config. Copy to
# `~/.config/chirpmunk/config.toml` and edit. CLI overrides:
#   --loopback         force loopback (skips device + radio)
#   --bind host:port   override [trx.network] bind

[device]
driver = "uhd"
param  = ""
clock  = "internal"

[logging]
level = "INFO"

[chirpmunk]
loopback = false

# ── Radio frontend ───────────────────────────────────────────────────
[radio_868]
freq           = 869618000
rx_channel     = [0]
rx_antenna     = ["RX2"]
tx_channel     = 0
tx_antenna     = "TX/RX"
rx_gain        = 50.0
tx_gain        = 50.0
lo_offset      = 62500
dc_offset_auto = true

# ── Transceiver ──────────────────────────────────────────────────────
[trx]
name      = "chirpmunk USRP 868"
radio     = "radio_868"
rate      = 1000000
enable_tx = true
use_aa_filter = true

[trx.transmit]
sf           = 8           # 7..=12
bw           = 62500       # Hz; one of {7.8k, 10.4k, 15.6k, 20.8k, 31.2k, 41.7k, 62.5k, 125k, 250k, 500k}
cr           = 4           # 1..=4 (chirpmunk: numerator-1) or 5..=8 (gr4-lora: denominator); 4 == CR 4/8
sync_word    = 0x12        # 0x12 MeshCore/Reticulum, 0x2B Meshtastic, 0x34 LoRaWAN
preamble_len = 16          # >= 6; MeshCore default 16, Semtech default 8

[trx.receive]
bandwidths = [62500, 125000, 250000]

[[trx.receive.chain]]
label = "promisc"

[trx.network]
udp_listen      = "127.0.0.1"
udp_port        = 5556
status_interval = 10
lbt             = false
lbt_timeout_ms  = 2000
tx_queue_depth  = 8
