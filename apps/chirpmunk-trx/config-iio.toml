# chirpmunk-trx config — PlutoSDR via seify IIO
[device]
driver = "iio"
param = "uri=ip:10.0.23.149"
clock = "internal"

[logging]
level = "INFO"

[radio_eu868]
freq = 869618000
rx_gain = 66
tx_gain = 89  # seify TX_GAIN_OFFSET=89, 0dB hw gain = max power

[trx]
radio = "eu868"
rate = 2500000

[trx.transmit]
sf = 7
bw = 125000
cr = 4
sync_word = 18
preamble_len = 8

[trx.receive]
bandwidths = [125000]
dedup_window_ms = 2000

[trx.network]
udp_listen = "0.0.0.0"
udp_port = 5556
lbt = false

[chirpmunk]
loopback = false
